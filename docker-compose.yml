services:
  web:
    build:
      context: .
      dockerfile: .docker/Dockerfile.alpine-tmpl
    ports:
      - "8000:80"
    environment:
      - TASMO_DATADIR=/data/tasmoadmin/
      - TASMO_DEBUG=1
    volumes:
      - ./tasmoadmin:/var/www/tasmoadmin
      - web_vendor:/var/www/tasmoadmin/vendor
      - ./.storage:/data/tasmoadmin
      - web_tmp:/var/www/tasmoadmin/tmp

volumes:
  web_vendor:
  web_tmp:
